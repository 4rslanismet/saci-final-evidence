
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>SACI Graph Viewer</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <link rel="stylesheet" href="../assets/saci-clean.css">
</head>
<body>
  <div class="clean-topbar">
    <a class="backlink" href="../index.html">← Ana kanıt portalına dön</a>
    <span class="topnote">SACI Final Evidence</span>
  </div>

<header>
  <h1>SACI Interactive Graph Viewer</h1>
  <p><a href="index.html">Back to package index</a></p>
</header>

<main>
  <section class="card">
    <label for="stage">Stage:</label>
    <select id="stage"></select>
    <button onclick="loadGraph()">Load graph</button>
    <span class="small" id="status"></span>
  </section>

  <section class="card">
    <div id="cy"></div>
  </section>

  <section class="card">
    <h2>Selected stage files</h2>
    <div id="files"></div>
  </section>
</main>

<script>
function getQueryStage() {
  const params = new URLSearchParams(window.location.search);
  return params.get("stage");
}

async function init() {
  const stages = await fetch("data/stages.json").then(r => r.json());
  const select = document.getElementById("stage");
  const requested = getQueryStage();

  stages.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s.dir;
    opt.textContent = s.label;
    if (requested && requested === s.dir) opt.selected = true;
    select.appendChild(opt);
  });

  await loadGraph();
}

async function loadGraph() {
  const stage = document.getElementById("stage").value;
  const status = document.getElementById("status");
  status.textContent = " loading...";

  const raw = await fetch(`data/${stage}/saci_graph.cyjs`).then(r => r.json());

  let elements = raw.elements;
  if (!Array.isArray(elements)) {
    elements = []
      .concat(raw.elements.nodes || [])
      .concat(raw.elements.edges || []);
  }

  elements = elements.map(el => {
    if (el.data && el.data.source && el.data.target) {
      const observed = String(el.data.observed);
      el.classes = observed === "1" ? "observed" : "missing";
      if (!el.data.label) {
        el.data.label = el.data.relationship || el.data.relation || "";
      }
    }
    return el;
  });

  cytoscape({
    container: document.getElementById("cy"),
    elements: elements,
    style: [
      {
        selector: "node",
        style: {
          "label": "data(label)",
          "font-size": 8,
          "text-wrap": "wrap",
          "text-max-width": 90,
          "background-color": "#60a5fa",
          "color": "#e5e7eb",
          "text-valign": "bottom",
          "text-halign": "center",
          "width": 34,
          "height": 34
        }
      },
      { selector: 'node[type = "asset"]', style: { "background-color": "#38bdf8" } },
      { selector: 'node[type = "control"]', style: { "background-color": "#22c55e" } },
      { selector: 'node[type = "wazuh_rule"]', style: { "background-color": "#f97316" } },
      { selector: 'node[type = "mitre"], node[type = "mitre_technique"]', style: { "background-color": "#a78bfa" } },
      { selector: 'node[type = "ioc"]', style: { "background-color": "#fb7185" } },
      { selector: 'node[type = "platform"]', style: { "background-color": "#14b8a6" } },
      {
        selector: "edge",
        style: {
          "curve-style": "bezier",
          "target-arrow-shape": "triangle",
          "line-color": "#64748b",
          "target-arrow-color": "#64748b",
          "width": 1,
          "label": "data(label)",
          "font-size": 6,
          "color": "#cbd5e1",
          "text-rotation": "autorotate",
          "text-background-color": "#020617",
          "text-background-opacity": 0.7
        }
      },
      {
        selector: "edge.missing",
        style: {
          "line-color": "#ef4444",
          "target-arrow-color": "#ef4444",
          "line-style": "dashed",
          "width": 3
        }
      },
      {
        selector: "edge.observed",
        style: {
          "line-color": "#94a3b8",
          "target-arrow-color": "#94a3b8"
        }
      }
    ],
    layout: {
      name: "cose",
      animate: false,
      fit: true,
      padding: 50,
      nodeRepulsion: 12000,
      idealEdgeLength: 110
    }
  });

  status.textContent = ` loaded: ${stage}`;

  document.getElementById("files").innerHTML = `
    <ul>
      <li><a href="data/${stage}/saci_graph.cyjs" target="_blank">saci_graph.cyjs</a></li>
      <li><a href="data/${stage}/saci_graph.mmd" target="_blank">saci_graph.mmd</a></li>
      <li><a href="data/${stage}/saci_graph_summary.md" target="_blank">saci_graph_summary.md</a></li>
      <li><a href="data/${stage}/saci_nodes.csv" target="_blank">saci_nodes.csv</a></li>
      <li><a href="data/${stage}/saci_edges.csv" target="_blank">saci_edges.csv</a></li>
      <li><a href="data/${stage}/saci_scores.csv" target="_blank">saci_scores.csv</a></li>
      <li><a href="data/${stage}/saci_llm_explanation.md" target="_blank">saci_llm_explanation.md</a></li>
    </ul>
  `;
}

init();
</script>
  <script defer src="../assets/saci-clean.js"></script>
</body>
</html>
